<script>
    let totalTime;
    let timeLeft;
    let timerInterval;
    let isPaused = false;

    // --- 音源の設定 ---
    // ここにiPadのタイマー音に近いフリー音源を指定しています
    const alarmSound = new Audio('https://actions.google.com/sounds/v1/alarms/beep_short.ogg');
    alarmSound.loop = true; // 止めるまで鳴らし続ける設定

    // (中略: SVG設定やpopulateSelectなどは前回と同じ)

    function startTimer() {
        const h = parseInt(document.getElementById('hours').value);
        const m = parseInt(document.getElementById('minutes').value);
        const s = parseInt(document.getElementById('seconds').value);
        
        totalTime = (h * 3600) + (m * 60) + s;
        timeLeft = totalTime;

        if (totalTime <= 0) return;

        // ブラウザの制限解除のため、開始時に一度無音で再生（おまじない）
        alarmSound.play().then(() => {
            alarmSound.pause();
            alarmSound.currentTime = 0;
        }).catch(e => console.log("Audio play blocked"));

        document.getElementById('setup-ui').style.display = 'none';
        document.getElementById('timer-ui').style.display = 'block';
        
        setProgress(100); 
        updateDisplay();
        runInterval();
    }

    function runInterval() {
        timerInterval = setInterval(() => {
            if (timeLeft > 0) {
                timeLeft--;
                updateDisplay();
            } else {
                clearInterval(timerInterval);
                setProgress(0);
                
                // --- 音を鳴らす ---
                alarmSound.play();
                
                // アラートが出てOKを押すまで鳴り続ける
                setTimeout(() => {
                    if(confirm("時間になりました！音を止めますか？")) {
                        alarmSound.pause();
                        alarmSound.currentTime = 0;
                        resetTimer();
                    }
                }, 100);
            }
        }, 1000);
    }

    function resetTimer() {
        clearInterval(timerInterval);
        alarmSound.pause(); // リセット時にも音を止める
        alarmSound.currentTime = 0;
        isPaused = false;
        document.getElementById('setup-ui').style.display = 'block';
        document.getElementById('timer-ui').style.display = 'none';
        document.getElementById('toggle-btn').innerText = "一時停止";
        document.getElementById('toggle-btn').className = "btn btn-pause";
        setProgress(100);
    }

    // (togglePause関数などは前回と同じ)
</script>
