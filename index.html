<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iPad Style Timer Pro</title>
    <style>
        :root {
            --bg-color: #000000;
            --text-color: #ffffff;
            --gray-btn: #333333;
            --orange-btn: #ff9f0a;
            --green-btn: #30d158;
            --red-btn: #ff453a;
            --progress-color: var(--orange-btn);
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .container {
            width: 400px;
            text-align: center;
        }

        /* 設定画面のスタイル */
        .picker-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin-bottom: 60px;
        }

        .picker-container select {
            background: transparent;
            color: white;
            border: none;
            font-size: 32px;
            font-weight: 300;
            border-bottom: 2px solid #333;
            appearance: none;
            padding: 5px 10px;
            outline: none;
        }

        /* カウントダウン画面のスタイル */
        .timer-ui-container {
            position: relative;
            width: 350px;
            height: 350px;
            margin: 0 auto 50px auto;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .progress-ring {
            position: absolute;
            top: 0;
            left: 0;
            transform: rotate(-90deg);
            transform-origin: 50% 50%;
        }

        .progress-ring__circle-bg {
            stroke: #222;
        }

        .progress-ring__circle {
            stroke: var(--progress-color);
            stroke-linecap: round;
            transition: stroke-dashoffset 1s linear;
        }

        .timer-display {
            font-size: 64px;
            font-weight: 200;
            font-variant-numeric: tabular-nums;
        }

        /* ボタンのスタイル */
        .controls {
            display: flex;
            justify-content: space-between;
            padding: 0 20px;
        }

        .btn {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: none;
            font-size: 17px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: opacity 0.2s;
        }

        .btn:active {
            opacity: 0.5;
        }

        .btn-cancel { background-color: var(--gray-btn); color: white; }
        .btn-start { background-color: #1c3d26; color: var(--green-btn); }
        .btn-pause { background-color: #3d2e1c; color: var(--orange-btn); }
    </style>
</head>
<body>

<div class="container">
    <div id="setup-ui">
        <div class="picker-container">
            <select id="hours"></select><span>時</span>
            <select id="minutes"></select><span>分</span>
            <select id="seconds"></select><span>秒</span>
        </div>
        <div class="controls">
            <button class="btn btn-cancel" onclick="resetTimer()">リセット</button>
            <button class="btn btn-start" onclick="startTimer()">開始</button>
        </div>
    </div>

    <div id="timer-ui" style="display: none;">
        <div class="timer-ui-container">
            <svg class="progress-ring" width="350" height="350">
                <circle class="progress-ring__circle-bg" stroke-width="8" fill="transparent" r="160" cx="175" cy="175"/>
                <circle id="progress-circle" class="progress-ring__circle" stroke-width="8" fill="transparent" r="160" cx="175" cy="175"/>
            </svg>
            <div class="timer-display" id="display">00:00:00</div>
        </div>
        <div class="controls">
            <button class="btn btn-cancel" onclick="resetTimer()">キャンセル</button>
            <button id="toggle-btn" class="btn btn-pause" onclick="togglePause()">一時停止</button>
        </div>
    </div>
</div>

<script>
    let totalTime;
    let timeLeft;
    let timerInterval;
    let isPaused = false;

    // アラーム音の設定（Google提供のフリー音源）
    const alarmSound = new Audio('https://actions.google.com/sounds/v1/alarms/beep_short.ogg');
    alarmSound.loop = true;

    // SVGプログレスバーの設定
    const circle = document.getElementById('progress-circle');
    const radius = circle.r.baseVal.value;
    const circumference = 2 * Math.PI * radius;
    circle.style.strokeDasharray = `${circumference} ${circumference}`;
    circle.style.strokeDashoffset = 0;

    function setProgress(percent) {
        const offset = circumference - (percent / 100 * circumference);
        circle.style.strokeDashoffset = offset;
    }

    // 時間選択肢の生成
    function populateSelect(id, max, defaultValue = 0) {
        const select = document.getElementById(id);
        for (let i = 0; i <= max; i++) {
            let opt = document.createElement('option');
            opt.value = i;
            opt.innerHTML = i.toString().padStart(2, '0');
            if (i === defaultValue) opt.selected = true;
            select.appendChild(opt);
        }
    }

    populateSelect('hours', 23);
    populateSelect('minutes', 59, 5); // デフォルト5分
    populateSelect('seconds', 59);

    function updateDisplay() {
        const h = Math.floor(timeLeft / 3600);
        const m = Math.floor((timeLeft % 3600) / 60);
        const s = timeLeft % 60;
        document.getElementById('display').innerText = 
            `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
        
        if (totalTime > 0) {
            setProgress((timeLeft / totalTime) * 100);
        }
    }

    function startTimer() {
        const h = parseInt(document.getElementById('hours').value);
        const m = parseInt(document.getElementById('minutes').value);
        const s = parseInt(document.getElementById('seconds').value);
        
        totalTime = (h * 3600) + (m * 60) + s;
        timeLeft = totalTime;

        if (totalTime <= 0) return;

        // 音声再生の制限を解除
        alarmSound.play().then(() => { alarmSound.pause(); alarmSound.currentTime = 0; }).catch(() => {});

        document.getElementById('setup-ui').style.display = 'none';
        document.getElementById('timer-ui').style.display = 'block';
        
        setProgress(100);
        updateDisplay();
        runInterval();
    }

    function runInterval() {
        timerInterval = setInterval(() => {
            if (timeLeft > 0) {
                timeLeft--;
                updateDisplay();
            } else {
                clearInterval(timerInterval);
                setProgress(0);
                alarmSound.play();
                setTimeout(() => {
                    if(confirm("時間になりました！")) {
                        resetTimer();
                    }
                }, 100);
            }
        }, 1000);
    }

    function togglePause() {
        const btn = document.getElementById('toggle-btn');
        if (isPaused) {
            runInterval();
            btn.innerText = "一時停止";
            btn.className = "btn btn-pause";
            isPaused = false;
        } else {
            clearInterval(timerInterval);
            btn.innerText = "再開";
            btn.className = "btn btn-start";
            isPaused = true;
        }
    }

    function resetTimer() {
        clearInterval(timerInterval);
        alarmSound.pause();
        alarmSound.currentTime = 0;
        isPaused = false;
        document.getElementById('setup-ui').style.display = 'block';
        document.getElementById('timer-ui').style.display = 'none';
        document.getElementById('toggle-btn').innerText = "一時停止";
        document.getElementById('toggle-btn').className = "btn btn-pause";
    }
</script>

</body>
</html>
