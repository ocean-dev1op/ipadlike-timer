<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iPad Style Timer Pro</title>
    <style>
        :root {
            --bg-color: #000000;
            --text-color: #ffffff;
            --gray-btn: #333333;
            --orange-btn: #ff9f0a;
            --green-btn: #30d158;
            --red-btn: #ff453a;
            --progress-color: var(--orange-btn);
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .container {
            width: 400px;
            text-align: center;
        }

        /* 設定画面のスタイル */
        .picker-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin-bottom: 60px;
        }

        .picker-container select {
            background: transparent;
            color: white;
            border: none;
            font-size: 32px;
            font-weight: 300;
            border-bottom: 2px solid #333;
            appearance: none;
            padding: 5px 10px;
            outline: none;
        }

        /* カウントダウン画面のスタイル */
        .timer-ui-container {
            position: relative;
            width: 350px;
            height: 350px;
            margin: 0 auto 50px auto;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .progress-ring {
            position: absolute;
            top: 0;
            left: 0;
            transform: rotate(-90deg);
            transform-origin: 50% 50%;
        }

        .progress-ring__circle-bg {
            stroke: #222;
        }

        .progress-ring__circle {
            stroke: var(--progress-color);
            stroke-linecap: round;
            transition: stroke-dashoffset 1s linear;
        }

        .timer-display {
            font-size: 64px;
            font-weight: 200;
            font-variant-numeric: tabular-nums;
        }

        /* ボタンのスタイル */
        .controls {
            display: flex;
            justify-content: space-between;
            padding: 0 20px;
        }

        .btn {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: none;
            font-size: 17px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: opacity 0.2s;
        }

        .btn:active {
            opacity: 0.5;
        }
