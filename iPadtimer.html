<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iPad Style Donut Timer</title>
    <style>
        :root {
            --bg-color: #000000;
            --text-color: #ffffff;
            --gray-btn: #333333;
            --orange-btn: #ff9f0a;
            --green-btn: #30d158;
            --red-btn: #ff453a;
            /* プログレスバーの色 */
            --progress-color: var(--orange-btn); 
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .container {
            width: 400px; /* iPad風に少し広く */
            text-align: center;
            position: relative;
        }

        /* --- 時間設定UI (ピッカー) --- */
        .picker-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin-bottom: 50px;
            font-size: 20px;
        }

        .picker-container select {
            background: transparent;
            color: white;
            border: none;
            font-size: 32px;
            font-weight: 300;
            border-bottom: 1px solid #333;
            appearance: none;
            padding: 5px 10px;
            cursor: pointer;
        }

        /* --- カウントダウンUI (ドーナツ & 文字) --- */
        .timer-ui-container {
            position: relative;
            width: 350px;
            height: 350px;
            margin: 0 auto 50px auto;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* SVGプログレスバーのスタイル */
        .progress-ring {
            position: absolute;
            top: 0;
            left: 0;
            transform: rotate(-90deg); /* 開始位置を真上にする */
            transform-origin: 50% 50%;
        }

        .progress-ring__circle-bg {
            stroke: #222; /* 薄いグレーの背景円 */
        }

        .progress-ring__circle {
            stroke: var(--progress-color);
            stroke-linecap: round; /* 線の先端を丸く */
            transition: stroke-dashoffset 0.1s linear; /* スムーズなアニメーション */
        }

        /* 中央の時間表示テキスト */
        .timer-display {
            font-size: 64px;
            font-weight: 200;
            font-variant-numeric: tabular-nums;
            position: relative;
            z-index: 10;
        }

        /* --- 操作ボタン --- */
        .controls {
            display: flex;
            justify-content: space-between;
            padding: 0 15px;
        }

        .btn {
            width: 85px;
            height: 85px;
            border-radius: 50%;
            border: none;
            font-size: 19px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: opacity 0.2s;
            font-weight: 400;
        }

        .btn:active {
            opacity: 0.6;
        }

        .btn-cancel {
            background-color: var(--gray-btn);
            color: white;
        }

        .btn-start {
            background-color: #1c3d26;
            color: var(--green-btn);
        }

        .btn-pause {
            background-color: #3d2e1c;
            color: var(--orange-btn);
        }
    </style>
</head>
<body>

<div class="container">
    <div id="setup-ui">
        <div class="picker-container">
            <select id="hours"></select><span>時間</span>
            <select id="minutes"></select><span>分</span>
            <select id="seconds"></select><span>秒</span>
        </div>
        <div class="controls">
            <button class="btn btn-cancel" onclick="resetTimer()">リセット</button>
            <button class="btn btn-start" onclick="startTimer()">開始</button>
        </div>
    </div>

    <div id="timer-ui" style="display: none;">
        <div class="timer-ui-container">
            <svg class="progress-ring" width="350" height="350">
                <circle
                    class="progress-ring__circle-bg"
                    stroke-width="10"
                    fill="transparent"
                    r="165"
                    cx="175"
                    cy="175"/>
                <circle
                    id="progress-circle"
                    class="progress-ring__circle"
                    stroke-width="10"
                    fill="transparent"
                    r="165"
                    cx="175"
                    cy="175"/>
            </svg>
            <div class="timer-display" id="display">00:00:00</div>
        </div>

        <div class="controls">
            <button class="btn btn-cancel" onclick="resetTimer()">キャンセル</button>
            <button id="toggle-btn" class="btn btn-pause" onclick="togglePause()">一時停止</button>
        </div>
    </div>
</div>

<script>
    let totalTime; // 設定された全時間(秒)
    let timeLeft;  // 残り時間(秒)
    let timerInterval;
    let isPaused = false;

    // SVGプログレスバーの設定
    const circle = document.getElementById('progress-circle');
    const radius = circle.r.baseVal.value;
    const circumference = 2 * Math.PI * radius; // 円周の計算

    // 円周の長さをSVGに設定 (最初は全表示)
    circle.style.strokeDasharray = `${circumference} ${circumference}`;
    circle.style.strokeDashoffset = circumference;

    // プログレスバーを更新する関数
    function setProgress(percent) {
        // 百分率からオフセット（削る長さ）を計算
        const offset = circumference - (percent / 100 * circumference);
        circle.style.strokeDashoffset = offset;
    }

    // セレクトボックスの初期化 (前回と同じ)
    function populateSelect(id, max) {
        const select = document.getElementById(id);
        for (let i = 0; i <= max; i++) {
            let opt = document.createElement('option');
            opt.value = i;
            opt.innerHTML = i.toString().padStart(2, '0');
            select.appendChild(opt);
        }
    }

    populateSelect('hours', 23);
    populateSelect('minutes', 59);
    populateSelect('seconds', 59);
    // 初期値を少し設定しておく(例: 5分)
    document.getElementById('minutes').value = 5;

    function updateDisplay() {
        const h = Math.floor(timeLeft / 3600);
        const m = Math.floor((timeLeft % 3600) / 60);
        const s = timeLeft % 60;
        document.getElementById('display').innerText = 
            `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
        
        // プログレスバーの更新
        if (totalTime > 0) {
            const percentage = (timeLeft / totalTime) * 100;
            setProgress(percentage);
        }
    }

    function startTimer() {
        const h = parseInt(document.getElementById('hours').value);
        const m = parseInt(document.getElementById('minutes').value);
        const s = parseInt(document.getElementById('seconds').value);
        
        totalTime = (h * 3600) + (m * 60) + s;
        timeLeft = totalTime;

        if (totalTime <= 0) return;

        document.getElementById('setup-ui').style.display = 'none';
        document.getElementById('timer-ui').style.display = 'block';
        
        // プログレスバーをリセット
        setProgress(100); 
        updateDisplay();
        runInterval();
    }

    function runInterval() {
        timerInterval = setInterval(() => {
            if (timeLeft > 0) {
                timeLeft--;
                updateDisplay();
            } else {
                clearInterval(timerInterval);
                setProgress(0); // 完全に消す
                alert("時間になりました！");
                resetTimer();
            }
        }, 1000);
    }

    function togglePause() {
        const btn = document.getElementById('toggle-btn');
        if (isPaused) {
            runInterval();
            btn.innerText = "一時停止";
            btn.className = "btn btn-pause";
            isPaused = false;
        } else {
            clearInterval(timerInterval);
            btn.innerText = "再開";
            btn.className = "btn btn-start";
            isPaused = true;
        }
    }

    function resetTimer() {
        clearInterval(timerInterval);
        isPaused = false;
        document.getElementById('setup-ui').style.display = 'block';
        document.getElementById('timer-ui').style.display = 'none';
        document.getElementById('toggle-btn').innerText = "一時停止";
        document.getElementById('toggle-btn').className = "btn btn-pause";
        setProgress(100); // プログレスバーを元に戻す
    }
</script>

</body>
</html>
